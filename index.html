<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&family=Montserrat:wght@100&family=Nunito:wght@300&family=Ubuntu:wght@300&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="main-container">
            <h1>To-Do List <img src="to-do.png" alt="to-do list image"></h1>
            <div class="add-task">
                <input type="text" placeholder="Enter your task." spellcheck="false" id="input-box">
                <button class="btn">Add</button>
            </div>
            <li class="alert"></li>
            <ul id="list-conatiner">
            </ul>
        </div>
        
    </div>

    <script src="To-DO.js"></script>
</body>
</html>
